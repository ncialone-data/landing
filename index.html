<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lustramax · Panel de Gestión</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8212A;
    --red-dark: #B81920;
    --red-light: #FDE8E9;
    --black: #111111;
    --gray-100: #F5F5F5;
    --gray-200: #E8E8E8;
    --gray-400: #9E9E9E;
    --gray-600: #555555;
    --white: #FFFFFF;
    --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
    --sidebar-w: 240px;
  }

  html, body {
    font-family: var(--font);
    height: 100%;
    overflow: hidden;
  }

  /* ── SHELL ── */
  .shell {
    display: flex;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--red);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    text-decoration: none;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--black);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { width: 20px; height: 20px; }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.3px;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    padding: 1.25rem 1.25rem 0.5rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.7rem 1.25rem;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    position: relative;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.12);
  }

  .nav-item.active {
    background: rgba(255,255,255,0.2);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--white);
    border-radius: 0 2px 2px 0;
  }

  .nav-icon {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .nav-item.active .nav-icon {
    background: rgba(255,255,255,0.25);
  }

  .nav-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--white);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-text { flex: 1; }

  .nav-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    display: block;
  }

  .nav-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    display: block;
    margin-top: 1px;
  }

  /* disabled */
  .nav-item.soon {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }

  .badge-soon {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 10px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 1rem 1.25rem;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    line-height: 1.5;
  }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--gray-100);
  }

  /* Topbar */
  .topbar {
    height: 48px;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    gap: 8px;
    flex-shrink: 0;
  }

  .breadcrumb {
    font-size: 13px;
    color: var(--gray-400);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb strong { color: var(--black); }

  .topbar-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-open {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-open:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .btn-open svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    background: var(--red-light);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
  }

  .welcome-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--red);
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--black);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 14px;
    color: var(--gray-600);
    max-width: 360px;
    line-height: 1.6;
  }

  /* iFrame */
  .iframe-wrap {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  .iframe-wrap.visible { display: flex; }

  .iframe-wrap iframe {
    flex: 1;
    border: none;
    width: 100%;
    height: 100%;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .sidebar { width: 200px; }
    .nav-desc { display: none; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <a class="sidebar-logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="2" y="21" font-family="Arial Black, sans-serif" font-size="17" font-weight="900" fill="white">LX</text>
        </svg>
      </div>
      <span class="logo-text">Lustramax.</span>
    </a>

    <div class="sidebar-section-label">Áreas</div>

    <!-- COBRANZAS — próximamente -->
    <button class="nav-item soon" disabled>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      </div>
      <div class="nav-text">
        <span class="nav-title">Cobranzas</span>
        <span class="nav-desc">Cuentas a cobrar</span>
      </div>
      <span class="badge-soon">Pronto</span>
    </button>

    <!-- COMERCIAL -->
    <button class="nav-item" data-url="https://ncialone-data.github.io/ventaremitos/" data-label="Comercial" data-ext="https://ncialone-data.github.io/ventaremitos/">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="nav-text">
        <span class="nav-title">Comercial</span>
        <span class="nav-desc">Ventas y pedidos</span>
      </div>
    </button>

    <!-- FINANZAS — próximamente -->
    <button class="nav-item soon" disabled>
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      </div>
      <div class="nav-text">
        <span class="nav-title">Finanzas</span>
        <span class="nav-desc">Flujo de caja</span>
      </div>
      <span class="badge-soon">Pronto</span>
    </button>

    <!-- LOGÍSTICA -->
    <button class="nav-item" data-url="https://ncialone-data.github.io/costoslogisticos/" data-label="Logística" data-ext="https://ncialone-data.github.io/costoslogisticos/">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <div class="nav-text">
        <span class="nav-title">Logística</span>
        <span class="nav-desc">Despachos y KPIs</span>
      </div>
    </button>

    <!-- INDUSTRIAL -->
    <button class="nav-item" data-url="industrial.html" data-label="Industrial" data-ext="industrial.html">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24"><path d="M2 20V10l5-5 5 5V4l5 5v11H2z"/><rect x="9" y="14" width="6" height="6"/></svg>
      </div>
      <div class="nav-text">
        <span class="nav-title">Industrial</span>
        <span class="nav-desc">Producción y planta</span>
      </div>
    </button>

    <div class="sidebar-footer">
      Uso interno · no compartir externamente
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="main" id="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">
        Panel de gestión
      </div>
      <div class="topbar-actions">
        <a class="btn-open" id="btn-open" href="#" target="_blank" rel="noopener" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Abrir en pestaña
        </a>
      </div>
    </div>

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <h2>Dashboards operativos</h2>
      <p>Seleccioná un área del menú lateral para ver el dashboard correspondiente.</p>
    </div>

    <!-- iFrame -->
    <div class="iframe-wrap" id="iframe-wrap">
      <iframe id="dashboard-frame" src="" title="Dashboard" allowfullscreen></iframe>
    </div>

  </div>
</div>

<script>
  const navItems = document.querySelectorAll('.nav-item:not(.soon)');
  const welcome = document.getElementById('welcome');
  const iframeWrap = document.getElementById('iframe-wrap');
  const frame = document.getElementById('dashboard-frame');
  const breadcrumb = document.getElementById('breadcrumb');
  const btnOpen = document.getElementById('btn-open');

  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const url = item.dataset.url;
      const label = item.dataset.label;
      const ext = item.dataset.ext;

      navItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');

      welcome.style.display = 'none';
      iframeWrap.classList.add('visible');

      frame.src = url;
      breadcrumb.innerHTML = `Panel de gestión &rsaquo; <strong>${label}</strong>`;
      btnOpen.href = ext;
      btnOpen.style.display = 'inline-flex';
    });
  });
</script>

</body>
</html>
